<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>My Team | Transfer Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-high": "#2e313d", "surface-bright": "#383942", "surface-variant": "#4d4648",
            "surface-dim": "#111318", "error-dim": "#ffb4ab", "surface-container-lowest": "#0c0e13",
            "outline": "#9a8f92", "surface-container-low": "#1a1c22", "surface-container-highest": "#33353e",
            "error": "#ffb4ab", "inverse-on-surface": "#2f3036", "on-surface": "#e3e2e6",
            "outline-variant": "#4d4648", "surface": "#111318", "primary": "#F2055C",
            "on-surface-variant": "#cfc4c7", "surface-container": "#1e2026", "background": "#111318",
            "on-background": "#e3e2e6",
          },
          "fontFamily": {
            "headline": ["Lexend", "Inter"], "body": ["Inter"], "label": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .pitch-gradient {
      background: linear-gradient(180deg, #05F26C 0%, #048a3e 100%);
    }

    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background text-on-background font-body min-h-screen transition-colors duration-300 pb-28">
  <header
    class="sticky top-0 z-50 flex items-center bg-background/80 backdrop-blur-xl px-6 py-5 justify-between border-b border-outline-variant/30">
    <div class="flex items-center gap-3">
      <div class="size-9 rounded-full bg-gradient-to-tr from-[#13ec5b] to-[#00f2ff] p-[2px]">
        <div class="w-full h-full rounded-full bg-background flex items-center justify-center">
          <span class="material-symbols-outlined text-sm text-[#13ec5b]">analytics</span>
        </div>
      </div>
      <h1 class="text-xl font-bold tracking-tight font-['Lexend']">Insight<span class="text-[#13ec5b]">.</span></h1>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <div class="mb-6 flex gap-3">
      <input type="number" id="manager-id-input" placeholder="Enter FPL Team ID (e.g., 123456)"
        class="flex-1 bg-surface-container rounded-xl px-4 py-3 text-sm text-white border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary outline-none">
      <button onclick="loadManagerTeam()"
        class="bg-primary text-white font-bold px-6 py-3 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center gap-2">
        <span class="material-symbols-outlined text-[20px]">search</span>
        Load
      </button>
    </div>

    <div class="flex items-center justify-between mb-6 bg-surface-container p-4 rounded-xl shadow-sm">
      <div>
        <h2 id="gw-label" class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-1">Game Week --
        </h2>
        <div class="flex items-baseline gap-2">
          <span class="text-3xl font-black text-on-surface" id="team-id-display">Live</span>
          <span class="text-sm font-bold text-primary">SQUAD</span>
        </div>
      </div>
    </div>

    <section
      class="relative w-full aspect-[3/4] md:aspect-[4/3] pitch-gradient rounded-3xl overflow-hidden shadow-2xl mb-8 p-4 flex flex-col justify-between">
      <div class="absolute inset-4 border-2 border-white/20 rounded-2xl pointer-events-none"></div>
      <div class="absolute top-1/2 left-0 right-0 h-px bg-white/20 pointer-events-none"></div>
      <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 border-2 border-white/20 rounded-full pointer-events-none">
      </div>

      <div id="pitch-fwd" class="relative z-10 flex justify-center gap-8 md:gap-16 pt-4 min-h-[100px]">
        <p class="text-white/50 text-sm my-auto">Enter ID to load Strikers</p>
      </div>

      <div id="pitch-mid" class="relative z-10 flex justify-around px-4 min-h-[100px]"></div>

      <div id="pitch-def" class="relative z-10 flex justify-around px-2 min-h-[100px]"></div>

      <div id="pitch-gk" class="relative z-10 flex justify-center pb-4 min-h-[100px]"></div>
    </section>

    <section class="bg-surface-container rounded-3xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-black text-on-surface uppercase tracking-tight">The Bench</h3>
        <span
          class="px-2 py-1 bg-surface-container-high rounded-full text-[10px] font-bold text-on-surface-variant uppercase">Substitutes</span>
      </div>
      <div id="bench-container" class="grid grid-cols-4 gap-2 md:gap-4">
        <p class="text-on-surface-variant text-sm col-span-4">Enter ID to load bench...</p>
      </div>
    </section>
  </main>

  <nav
    class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-surface-container-lowest/95 backdrop-blur-md border-t border-outline-variant/20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.2)] z-50 rounded-t-2xl">
    <a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5 hover:text-primary active:scale-90 transition-all duration-200"
      href="/">
      <span class="material-symbols-outlined mb-1" data-icon="science">science</span>
      <span class="font-inter text-[11px] font-medium">Transfer Lab</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-xl px-5 py-1.5 active:scale-90 transition-all duration-200"
      href="/static/my-team.html">
      <span class="material-symbols-outlined mb-1" data-icon="group"
        style="font-variation-settings: 'FILL' 1;">group</span>
      <span class="font-inter text-[11px] font-bold">My Team</span>
    </a>
  </nav>

  <script>
    async function loadManagerTeam() {
      const managerId = document.getElementById('manager-id-input').value;
      if (!managerId) {
        alert("Please enter a valid FPL Manager ID.");
        return;
      }

      // Set loading state
      document.getElementById('pitch-fwd').innerHTML = '';
      document.getElementById('pitch-mid').innerHTML = '<p class="text-white/80 font-bold text-center w-full mt-4">Fetching Squad Data...</p>';
      document.getElementById('pitch-def').innerHTML = '';
      document.getElementById('pitch-gk').innerHTML = '';
      document.getElementById('bench-container').innerHTML = '';
      document.getElementById('team-id-display').textContent = "...";

      try {
        // Fetch from our Python backend! (If running locally, it defaults to the same host)
        const response = await fetch(`/api/my-team/${managerId}`);
        const data = await response.json();

        if (data.error) {
          throw new Error(data.error);
        }

        // Update Header
        document.getElementById('gw-label').textContent = `Game Week ${data.gameweek}`;
        document.getElementById('team-id-display').textContent = data.manager_id;

        // Sort players by position (1=GK, 2=DEF, 3=MID, 4=FWD)
        const starters = data.squad.starting_xi;
        const fwds = starters.filter(p => p.position === 4);
        const mids = starters.filter(p => p.position === 3);
        const defs = starters.filter(p => p.position === 2);
        const gks = starters.filter(p => p.position === 1);

        // Inject into Pitch
        document.getElementById('pitch-fwd').innerHTML = fwds.map(p => createPlayerCard(p)).join('');
        document.getElementById('pitch-mid').innerHTML = mids.map(p => createPlayerCard(p)).join('');
        document.getElementById('pitch-def').innerHTML = defs.map(p => createPlayerCard(p)).join('');
        document.getElementById('pitch-gk').innerHTML = gks.map(p => createPlayerCard(p)).join('');

        // Inject into Bench
        document.getElementById('bench-container').innerHTML = data.squad.bench.map(p => createBenchCard(p)).join('');

      } catch (error) {
        console.error(error);
        alert("Could not load team. Check the ID and try again.");
        document.getElementById('pitch-mid').innerHTML = '<p class="text-red-300 font-bold text-center w-full mt-4">Error loading team.</p>';
      }
    }

    function createPlayerCard(player) {
      // Check for Captain/Vice-Captain Badges
      let badgeHtml = '';
      if (player.is_captain) {
        badgeHtml = `<div class="absolute -bottom-1 -right-1 w-6 h-6 bg-pink-600 text-white text-[10px] font-black rounded-full flex items-center justify-center border-2 border-white">C</div>`;
      } else if (player.is_vice_captain) {
        badgeHtml = `<div class="absolute -bottom-1 -right-1 w-6 h-6 bg-slate-400 text-white text-[10px] font-black rounded-full flex items-center justify-center border-2 border-white">V</div>`;
      }

      return `
            <div class="flex flex-col items-center w-16 md:w-20">
                <div class="relative">
                    <div class="w-12 h-12 md:w-16 md:h-16 bg-white rounded-full flex items-center justify-center shadow-lg border-2 border-white overflow-hidden">
                        <img class="w-full h-full object-cover" src="${player.image_url}" alt="${player.name}" onerror="this.src='https://resources.premierleague.com/premierleague/photos/players/110x140/Photo-Missing.png'"/>
                    </div>
                    ${badgeHtml}
                </div>
                <span class="mt-2 px-1.5 py-0.5 bg-black/80 backdrop-blur-sm text-white text-[9px] md:text-[10px] font-bold rounded uppercase truncate w-full text-center">${player.name}</span>
                <span class="text-white text-[9px] md:text-[10px] font-bold mt-0.5 drop-shadow-md">${player.price}</span>
            </div>`;
    }

    function createBenchCard(player) {
      // Convert numerical position to text for the bench UI
      const posMap = { 1: "GK", 2: "DEF", 3: "MID", 4: "FWD" };

      return `
            <div class="bg-surface-container-highest p-2 rounded-2xl flex flex-col items-center shadow-sm">
                <div class="w-10 h-10 bg-surface-container-low rounded-full overflow-hidden mb-2 border-2 border-outline-variant/10">
                    <img class="w-full h-full object-cover" src="${player.image_url}" alt="${player.name}" onerror="this.src='https://resources.premierleague.com/premierleague/photos/players/110x140/Photo-Missing.png'"/>
                </div>
                <span class="text-[9px] font-black uppercase text-on-surface truncate w-full text-center">${player.name}</span>
                <span class="text-[8px] font-medium text-on-surface-variant">${posMap[player.position]} • ${player.price}</span>
            </div>`;
    }
  </script>
</body>

</html>
