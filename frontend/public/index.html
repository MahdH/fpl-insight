<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPL Insight Dashboard</title>
    <style>
        /* Modern Dashboard CSS Grid */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f3f4f6; padding: 2rem; color: #1f2937; }
        .header { text-align: center; margin-bottom: 2rem; }
        
        /* This creates the side-by-side layout */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
        
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { font-size: 1.25rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; margin-top: 0; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 1rem; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f9fafb; }
        .score { font-weight: bold; color: #10b981; } /* Green text for the forecast score */
        .injured { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 FPL Insight Engine</h1>
        <p>Live forecasting and data analytics</p>
    </div>

    <div class="dashboard">
        
        <div class="card">
            <h2>⭐ Top 3 Performers</h2>
            <button onclick="fetchTopPerformers()">Load Performers</button>
            <div id="performers-results"><p style="color: #6b7280;">Waiting for data...</p></div>
        </div>

        <div class="card">
            <h2>🔮 Top 10 Strikers Forecast</h2>
            <button onclick="fetchForecast()">Run AI Algorithm</button>
            <div id="forecast-results"><p style="color: #6b7280;">Waiting for data...</p></div>
        </div>

        <div class="card">
            <h2>🏥 Live Injury Report</h2>
            <button onclick="fetchInjuries()">Load Injuries</button>
            <div id="injuries-results"><p style="color: #6b7280;">Waiting for data...</p></div>
        </div>

    </div>

    <script>
        const BASE_URL = "https://forecast-api-635659809820.northamerica-northeast2.run.app";

        // YOUR TOP PERFORMERS FUNCTION
        async function fetchTopPerformers() {
            // Paste your existing fetch logic for the top 3 performers here!
            const resultDiv = document.getElementById('performers-results');
            resultDiv.innerHTML = "<p><i>Reavling Top Performers...</i></p>";
            try {
                const response = await fetch(`${BASE_URL}/players/top-form`);
                const data = await response.json();
                const players = data.top_5_players_inform;

                console.log("Here is what Python sent back:", data);

                let html = `<table><tr><th>Name</th><th>Points</th><th>Form</th></tr>`;
                players.forEach(p => {
                    html += `<tr>
                        <td><strong>${p.web_name}</strong></td>
                        <td>${p.total_points}</td>
                        <td>${p.form}</td>
                    </tr>`;
                });
                html += "</table>";
                resultDiv.innerHTML = html;
            } catch (err) {
                resultDiv.innerHTML = `<p style="color:red;">Error connecting to API.</p>`;
                console.error(err);
            }
        }

        // STRIKER FORECAST FUNCTION
        async function fetchForecast() {
            const resultsDiv = document.getElementById('forecast-results');
            resultsDiv.innerHTML = "<p>Crunching the numbers...</p>";
            try {
                // Append the exact route to the BASE_URL
                const response = await fetch(`${BASE_URL}/strikers/forecast`);
                const data = await response.json();
                const strikers = data.top_10_strikers;

                console.log("Here is what Python sent back:", data);

                let html = `<table><tr><th>Name</th><th>Form</th><th>Points</th><th>Score</th></tr>`;
                strikers.forEach(p => {
                    html += `<tr>
                        <td><strong>${p.web_name}</strong></td>
                        <td>${p.avg_next_3_fdr}</td>
                        <td>${p.expected_goals}</td>
                        <td class="score">${p.forecast_score}</td>
                    </tr>`;
                });
                html += "</table>";
                resultsDiv.innerHTML = html;
            } catch (err) {
                resultsDiv.innerHTML = `<p style="color:red;">Error connecting to API.</p>`;
                console.error(err);
            }
        }

        // --- 3. INJURIES FUNCTION ---
        async function fetchInjuries() {
            const resultsDiv = document.getElementById('injuries-results');
            resultsDiv.innerHTML = "<p>Loading...</p>";
            try {
                const response = await fetch(`${BASE_URL}/players/injured`);
                const data = await response.json();
                const players = data.injured_players;

                console.log("Here is what Python sent back:", data);

                let html = `<table><tr><th>Name</th><th>Status</th></tr>`;
                
                // .slice(0, 10) prevents the card from getting 300 rows long!
                players.slice(0, 10).forEach(p => {
                    html += `<tr>
                        <td><strong>${p.web_name}</strong></td>
                        <td class="injured">${p.status.toUpperCase()}</td>
                    </tr>`;
                });
                html += "</table><p style='text-align:center; font-size:0.8rem; color:gray; margin-top:10px;'>Showing top 10</p>";
                resultsDiv.innerHTML = html;
            } catch (err) {
                resultsDiv.innerHTML = `<p style="color:red;">Error connecting to API.</p>`;
                console.error(err);
            }
        }
    </script>
</body>
</html>
