<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPL Insight Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); }
        h1 { margin-top: 0; color: #111827; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        button { background-color: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-bottom: 20px; transition: background 0.2s; }
        button:hover { background-color: #2563eb; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f9fafb; font-weight: 600; }
        .injured { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏥 Live Injury Report</h1>
        <button onclick="fetchInjuries()">Fetch Cloud Data</button>
        
        <div id="results">
            <p style="color: #6b7280;">Click the button to pull live data from your Cloud Run API...</p>
        </div>
    </div>

    <script>
        // 🛑 PASTE YOUR LIVE GOOGLE CLOUD URL HERE!
        const API_URL = "https://forecast-api-635659809820.northamerica-northeast2.run.app/players/injured";

        async function fetchInjuries() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p>Loading from server...</p>";

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                console.log("Here is the exact data from Python:", data);
                
                // Extract the list of players from the JSON
                const players = data.injured_players;

                // Build a readable HTML table
                let tableHTML = `
                    <table>
                        <tr>
                            <th>Player Name</th>
                            <th>Status</th>
                            <th>Injury News</th>
                        </tr>
                `;
                
                players.forEach(player => {
                    tableHTML += `
                        <tr>
                            <td><strong>${player.web_name}</strong></td>
                            <td class="injured">${player.status.toUpperCase()}</td>
                            <td>${player.news}</td>
                        </tr>
                    `;
                });
                
                tableHTML += "</table>";
                resultsDiv.innerHTML = tableHTML;

            } catch (error) {
                resultsDiv.innerHTML = `<p style="color: red;"><strong>Connection Error!</strong> Did you update the API_URL in the code, and did you add the CORS fix to your Python backend?</p>`;
                console.error("Fetch error:", error);
            }
        }
    </script>

</body>
</html>
